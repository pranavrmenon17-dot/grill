<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bite Club | Feedback Survey</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0A0A0A;color:#F5F0E1}
.container{max-width:850px;margin:auto;padding:20px}
.hero{text-align:center;padding:40px 20px}
.hero h1{color:#D4AF37}
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gallery img{width:100%;border-radius:12px;height:260px;object-fit:cover}
form{background:#141414;padding:24px;border-radius:16px;margin-top:20px}
label{display:block;margin-top:16px;margin-bottom:6px}
input,textarea,select{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#1A1A1A;color:white}
button{margin-top:20px;background:#D4AF37;color:black;border:none;padding:14px 20px;border-radius:8px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<h1>Bite Club</h1>
<p>India's first custom grillz brand — real cast pieces, made-to-fit, designed by you.</p>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1200&q=80">
<img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=1200&q=80">
</div>
</div>

<form action="https://formsubmit.co/tanishsk30@gmail.com" method="POST">
<input type="hidden" name="_subject" value="New Bite Club Survey Response">
<input type="hidden" name="_captcha" value="false">

<label>Name</label>
<input type="text" name="name">

<label>Email</label>
<input type="email" name="email">

<label>Age Group</label>
<select name="age_group">
<option>Under 18</option>
<option>18-24</option>
<option>25-34</option>
<option>35-44</option>
<option>45+</option>
</select>

<label>Have you heard of grillz before?</label>
<select name="heard_of_grillz">
<option>Yes</option>
<option>No</option>
</select>

<label>How interested are you in owning custom grillz? (1-10)</label>
<input type="number" min="1" max="10" name="interest">

<label>Preferred Style</label>
<input type="text" name="style">

<label>Reasonable Price Range</label>
<input type="text" name="price_range">

<label>Biggest concern about buying grillz?</label>
<textarea name="concern"></textarea>

<label>Additional feedback</label>
<textarea name="feedback"></textarea>

<button type="submit">Submit Survey</button>
</form>
</div>
</body>
</html>
