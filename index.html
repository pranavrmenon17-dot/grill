<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bite Club | Premium Grillz Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Inter,sans-serif;background:#0A0A0A;color:#F5F0E1}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero:before{
content:"";position:absolute;inset:0;
background:url('images/grillz-hero.jpg') center/cover no-repeat;
opacity:.16;filter:blur(2px);transform:scale(1.05);
}
.hero:after{
content:"";position:absolute;inset:0;
background:radial-gradient(circle,transparent 0%,rgba(10,10,10,.45) 40%,#0A0A0A 100%);
}
.hero-content{position:relative;z-index:2;max-width:900px;padding:20px}
.eyebrow{letter-spacing:4px;color:#D4AF37;text-transform:uppercase;font-size:.8rem}
h1{font-family:'Archivo Black';font-size:clamp(3rem,10vw,7rem);color:#D4AF37}
.tagline{font-size:1.3rem;margin:15px 0}
.sub{max-width:650px;margin:auto;color:#bdb5a3}
.cta{display:inline-block;margin-top:30px;padding:16px 32px;background:#D4AF37;color:#000;text-decoration:none;border-radius:999px;font-weight:700}
.container{max-width:1100px;margin:auto;padding:60px 20px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:50px}
.gallery img{width:100%;height:320px;object-fit:cover;border-radius:20px;border:1px solid #333}
.card{background:#141414;border:1px solid #2A2A2A;border-radius:24px;padding:35px}
.section-title{color:#D4AF37;margin:30px 0 10px}
label{display:block;margin-top:15px;font-weight:600}
input,select,textarea{
width:100%;padding:14px;margin-top:8px;
background:#1A1A1A;color:#fff;border:1px solid #333;border-radius:12px;
}
textarea{min-height:120px}
button{
width:100%;margin-top:30px;padding:18px;
background:#D4AF37;color:#000;border:none;border-radius:14px;
font-weight:700;font-size:1rem;cursor:pointer;
}
.progress{height:8px;background:#222;border-radius:999px;margin-bottom:25px;overflow:hidden}
.progress span{display:block;width:100%;height:100%;background:#D4AF37}
.footer{text-align:center;padding:40px;color:#777}
</style>
</head>
<body>

<section class="hero">
<div class="hero-content">
<div class="eyebrow">Bite Club • India</div>
<h1>BITE CLUB</h1>
<p class="tagline">India's First Custom Grillz Brand</p>
<p class="sub">Real cast pieces. Made-to-fit. Designed by you. Help us shape the future of premium custom grillz in India.</p>
<a href="#survey" class="cta">Take The Survey</a>
</div>
</section>

<div class="container">
<div class="gallery">
<img src="images/grillz-1.jpg" alt="Gold Grillz">
<img src="images/grillz-2.jpg" alt="Diamond Grillz">
<img src="images/grillz-3.jpg" alt="Custom Grillz">
</div>

<div class="card" id="survey">
<div class="progress"><span></span></div>

<form action="https://formsubmit.co/tanishsk30@gmail.com" method="POST">
<input type="hidden" name="_subject" value="New Bite Club Survey Response">
<input type="hidden" name="_captcha" value="false">

<h2 class="section-title">About You</h2>

<label>Name</label>
<input name="Name">

<label>Email</label>
<input type="email" name="Email">

<label>Age Group</label>
<select name="Age Group">
<option>Under 18</option>
<option>18-24</option>
<option>25-34</option>
<option>35-44</option>
<option>45+</option>
</select>

<label>City</label>
<input name="City">

<h2 class="section-title">Grillz Awareness</h2>

<label>Have you heard of grillz before?</label>
<select name="Heard Of Grillz">
<option>Yes</option>
<option>No</option>
</select>

<label>Where have you seen grillz?</label>
<input name="Where Seen">

<label>Favorite artist/influencer with grillz?</label>
<input name="Influencer">

<h2 class="section-title">Interest & Style</h2>

<label>Interest Level (1-10)</label>
<input type="number" min="1" max="10" name="Interest">

<label>Preferred Style</label>
<input name="Style">

<label>Which teeth would you customize?</label>
<input name="Teeth">

<label>Purpose of wearing grillz?</label>
<input name="Purpose">

<h2 class="section-title">Pricing</h2>

<label>Expected Budget</label>
<input name="Budget">

<label>Would you pay more for fully custom pieces?</label>
<select name="Custom Premium">
<option>Yes</option>
<option>Maybe</option>
<option>No</option>
</select>

<h2 class="section-title">Feedback</h2>

<label>Biggest concern about buying grillz?</label>
<textarea name="Concern"></textarea>

<label>What would make Bite Club stand out?</label>
<textarea name="Standout"></textarea>

<label>Additional feedback</label>
<textarea name="Feedback"></textarea>

<button type="submit">Submit Survey</button>
</form>
</div>
</div>

<div class="footer">
Bite Club © 2026 • Premium Custom Grillz
</div>

</body>
</html>
